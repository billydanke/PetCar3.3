<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PetCar Control Console</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <aside class="panel settings-panel">
      <div class="panel-head">
        <div>
          <h2>Connection Settings</h2>
        </div>
      </div>

      <div class="panel-body settings-body">
        <label class="field">
          <span class="field-label">Base IP Address</span>
          <input id="baseIp" type="text" value="192.168.0.106" autocomplete="off" spellcheck="false" />
        </label>

        <div class="field-grid">
          <label class="field">
            <span class="field-label">Camera Port</span>
            <input id="cameraPort" type="text" value="8889" autocomplete="off" spellcheck="false" />
          </label>
          <label class="field">
            <span class="field-label">Camera Path</span>
            <input id="cameraPath" type="text" value="/cam" autocomplete="off" spellcheck="false" />
          </label>
        </div>

        <label class="field">
          <span class="field-label">WebSocket Port</span>
          <input id="wsPort" type="text" value="8080" autocomplete="off" spellcheck="false" />
        </label>

        <div class="preview-card">
          <div class="preview-row">
            <span class="preview-label">Camera URL</span>
            <code id="cameraUrlPreview"></code>
          </div>
          <div class="preview-row">
            <span class="preview-label">WebSocket URL</span>
            <code id="wsUrlPreview"></code>
          </div>
        </div>

        <div class="settings-actions">
          <button id="connectBtn" class="btn btn-primary">Connect</button>
        </div>

        <div class="status-group">
          <div class="status-chip">
            <span id="wsDot" class="dot" aria-hidden="true"></span>
            <span id="wsState">Disconnected</span>
          </div>
          <div class="status-chip muted">
            <span>Signal</span>
            <span id="signalState">Pending</span>
          </div>
        </div>
      </div>
    </aside>

    <section class="panel stage-panel">
      <div class="panel-head">
        <div>
          <h2>Camera Feed</h2>
        </div>
      </div>

      <div class="panel-body stage-body">
        <div class="video-shell">
          <iframe id="cameraFrame" title="Robot camera"></iframe>

          <div class="camera-overlay top-right">
            <div class="hud-card battery-card">
              <div class="battery-topline">
                <span>Battery</span>
                <span id="batteryText">--%</span>
              </div>
              <div class="battery-track">
                <div id="batteryBar" class="battery-bar"></div>
              </div>
            </div>
          </div>

          <div class="camera-overlay bottom-left">
            <section class="overlay-card drive-card" aria-label="Drive controls">
              <div class="overlay-head">
                <span>Drive</span>
              </div>

              <div class="drive-grid">
                <button id="driveRotateLeft" class="drive-btn rotate-btn" data-drive-action="rotate-left" aria-label="Rotate left">
                  <span class="icon">&#8634;</span>
                  <span class="keycap">Q</span>
                </button>
                <button id="driveForward" class="drive-btn" data-drive-action="forward" aria-label="Drive forward">
                  <span class="icon">&#8593;</span>
                  <span class="keycap">W</span>
                </button>
                <button id="driveRotateRight" class="drive-btn rotate-btn" data-drive-action="rotate-right" aria-label="Rotate right">
                  <span class="icon">&#8635;</span>
                  <span class="keycap">E</span>
                </button>

                <button id="driveLeft" class="drive-btn" data-drive-action="left" aria-label="Translate left">
                  <span class="icon">&#8592;</span>
                  <span class="keycap">A</span>
                </button>
                <button id="driveStop" class="drive-btn stop-btn" data-drive-action="stop" aria-label="Stop all drive motion">
                  <span class="icon">STOP</span>
                  <span class="keycap">SPACE</span>
                </button>
                <button id="driveRight" class="drive-btn" data-drive-action="right" aria-label="Translate right">
                  <span class="icon">&#8594;</span>
                  <span class="keycap">D</span>
                </button>

                <button id="crawlToggle" class="drive-btn crawl-btn" aria-pressed="false" aria-label="Toggle crawl mode">
                  <span class="utility-text">CRAWL</span>
                  <span class="keycap">CTRL</span>
                </button>
                <button id="driveBackward" class="drive-btn" data-drive-action="backward" aria-label="Drive backward">
                  <span class="icon">&#8595;</span>
                  <span class="keycap">S</span>
                </button>
              </div>
            </section>
          </div>

          <div class="camera-overlay bottom-right">
            <section class="overlay-card servo-card" aria-label="Camera pan and tilt controls">
              <div class="overlay-head">
                <span>Pan / Tilt</span>
                <span class="overlay-subtitle">Arrow Keys</span>
              </div>

              <div id="servoPad" class="servo-pad" tabindex="0" aria-label="Pan and tilt targeting frame">
                <div id="servoDot" class="servo-dot" aria-hidden="true"></div>
              </div>

              <div class="servo-actions">
                <button id="homeBtn" class="utility-btn" aria-pressed="true">
                  <span class="utility-text">Home</span>
                  <span class="keycap">H</span>
                </button>
                <button id="nightvisionToggle" class="utility-btn" aria-pressed="false">
                  <span class="utility-text">Night Vision</span>
                  <span class="keycap">SHIFT</span>
                </button>
              </div>
            </section>
          </div>
        </div>
      </div>
    </section>

    <aside class="panel log-panel">
      <div class="panel-head">
        <div>
          <h2>Packet Log</h2>
        </div>
      </div>
      <div id="packetLog" class="packet-log panel-body"></div>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
